name: CI/CD Backend Innovatech

on:
  push:
    branches:
      - deploy

jobs:
  build:
    name: Build y Push imagen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-innovatech:latest

  deploy:
    name: Deploy en EC2 Backend via Frontend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH Jump
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_BACKEND_HOST }} "
              echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
              docker stop backend-app || true
              docker rm backend-app || true
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend-innovatech:latest
              docker run -d \
                --name backend-app \
                --restart unless-stopped \
                -p 8080:8080 \
                -e NODE_ENV=production \
                -e PORT=8080 \
                -e DB_HOST=${{ secrets.DB_HOST }} \
                -e DB_PORT=3306 \
                -e DB_NAME=innovatech \
                -e DB_USER=root \
                -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                ${{ secrets.DOCKERHUB_USERNAME }}/backend-innovatech:latest
              docker ps | grep backend-app
              echo '✅ Backend desplegado OK'
            "
